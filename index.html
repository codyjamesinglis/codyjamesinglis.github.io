<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>cjinglis.info</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap');
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;1,100;1,200;1,300;1,400;1,500;1,600;1,700&display=swap');
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: 'EB Garamond', Georgia, serif;
      background: #fffaf1;
      color: #222;
      position: relative;
    }

    /* ================================================================
       DESKTOP LAYOUT (>= 768px)
       Sidebar on the left, iframe fills the rest.
    ================================================================ */

    .site-shell {
      display: flex;
      height: 100vh;
    }

    .sidebar {
      width: 25%;
      min-width: 180px;
      max-width: 260px;
      height: 100vh;
      position: sticky;
      top: 0;
      background: #fffaf1;
      border-right: 1px solid #e8e5e0;
      display: flex;
      flex-direction: column;
      padding: 2.75rem 2rem 2rem;
      flex-shrink: 0;
    }

    .sidebar-name {
      font-size: 1.5rem;
      font-weight: normal;
      color: #111;
      line-height: 1.75;
      margin-bottom: 0.5rem;
    }

    .sidebar-role {
      font-family: 'IBM Plex Mono', Courier, monospace;
      font-size: 0.7rem;
      letter-spacing: 0.04em;
      color: #aaa;
      line-height: 1.5;
      margin-bottom: 2.5rem;
    }

    nav {
      display: flex;
      flex-direction: column;
    }

    .nav-link {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.45rem 0;
      font-family: 'IBM Plex Mono', Courier, monospace;
      font-size: 1rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #aaa;
      text-decoration: none;
      background: none;
      border: none;
      width: 100%;
      text-align: left;
      cursor: pointer;
      transition: color 0.15s;
    }

    .nav-link:hover {
      color: #333;
    }

    .nav-link.active {
      color: #111;
    }

    .nav-arrow {
      width: 0;
      height: 0;
      border-top: 4px solid transparent;
      border-bottom: 4px solid transparent;
      border-left: 5px solid #111;
      opacity: 0;
      transition: opacity 0.15s;
      flex-shrink: 0;
    }

    .nav-link.active .nav-arrow {
      opacity: 1;
    }

    .sidebar-footer {
      margin-top: auto;
      font-family: 'IBM Plex Mono', Courier, monospace;
      font-size: 0.65rem;
      letter-spacing: 0.03em;
      color: #ccc;
      line-height: 1.6;
    }

    .sidebar-footer a {
      color: #bbb;
      text-decoration: none;
    }

    .sidebar-footer a:hover {
      color: #666;
    }

    #content-frame {
      flex: 1;
      height: 100vh;
      border: none;
      display: block;
    }

    /* ================================================================
       MOBILE LAYOUT (< 768px)
       Top bar with hamburger, dropdown nav, full-width iframe below.
    ================================================================ */

    .mobile-bar {
      display: none;
      align-items: center;
      justify-content: space-between;
      padding: 0 1.25rem;
      height: 52px;
      background: #fffaf1;
      border-bottom: 1px solid #e8e5e0;
      position: sticky;
      top: 0;
      z-index: 100;
      flex-shrink: 0;
    }

    .mobile-bar-name {
      font-size: 0.9rem;
      color: #111;
    }

    .hamburger {
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 5px;
      width: 32px;
      height: 32px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
    }

    .hamburger span {
      display: block;
      width: 20px;
      height: 1.5px;
      background: #555;
      border-radius: 1px;
      transition: transform 0.2s, opacity 0.2s;
    }

    .hamburger.open span:nth-child(1) {
      transform: translateY(6.5px) rotate(45deg);
    }

    .hamburger.open span:nth-child(2) {
      opacity: 0;
    }

    .hamburger.open span:nth-child(3) {
      transform: translateY(-6.5px) rotate(-45deg);
    }

    .mobile-nav {
      display: none;
      flex-direction: column;
      background: #fffaf1;
      border-bottom: 1px solid #e8e5e0;
      position: absolute;
      top: 52px;
      left: 0;
      right: 0;
      z-index: 200;
    }

    .mobile-nav.open {
      display: flex;
    }

    .mobile-nav .nav-link {
      padding: 0.85rem 1.25rem;
      border-bottom: 1px solid #e8e5e0;
      font-size: 0.8rem;
      justify-content: flex-start;
      gap: 0.75rem;
    }

    .mobile-nav .nav-link:last-child {
      border-bottom: none;
    }

    .mobile-nav .nav-link.active {
      background: #eeecea;
    }

    @media (max-width: 767px) {
      .site-shell {
        flex-direction: column;
        height: auto;
      }

      .sidebar {
        display: none;
      }

      .mobile-bar {
        display: flex;
      }

      #content-frame {
        height: calc(100vh - 52px);
        width: 100%;
        flex: none;
      }
    }
  </style>
</head>
<body>

<!-- Mobile top bar -->
<div class="mobile-bar">
  <span class="mobile-bar-name">Cody Inglis</span>
  <button class="hamburger" id="hamburger-btn" aria-label="Toggle navigation" aria-expanded="false">
   <span></span>
   <span></span>
   <span></span>
  </button>
</div>

<!-- Mobile dropdown nav -->
<nav class="mobile-nav" id="mobile-nav">
 <a class="nav-link active" onclick="loadPage('home.html', this, true)" href="home.html">
  <span class="nav-arrow"></span>Home
 </a>
 <a class="nav-link" onclick="loadPage('cv.html', this, true)" href="cv.html">
  <span class="nav-arrow"></span>CV + Publications
 </a>
 <!-- <a class="nav-link" onclick="loadPage('notebook.html', this, true)" href="notebook.html">
  <span class="nav-arrow"></span>Notebook
 </a> -->
</nav>

<!-- Desktop shell: sidebar + iframe -->
<div class="site-shell">
  
  <aside class="sidebar">
    <p class="sidebar-name">Cody James Inglis</p>
    <p class="sidebar-role">
      Research Affiliate<br>
      CEU Democracy Institute
    </p>

    <nav>
      <a class="nav-link active" onclick="loadPage('home.html', this, false)" href="home.html">
        <span>Home</span>
        <span class="nav-arrow"></span>
      </a>
      <a class="nav-link" onclick="loadPage('cv.html', this, false)" href="cv.html">
        <span>CV & Publications</span>
        <span class="nav-arrow"></span>
      </a>
      <!-- <a class="nav-link" onclick="loadPage('notebook.html', this, false)" href="notebook.html">
        <span>Notebook</span>
        <span class="nav-arrow"></span>
      </a> --> <!-- Keep out notebook for now -->
    </nav>

    <div class="sidebar-footer">
      <a href="https://democracyinstitute.ceu.edu/people/cody-inglis"
         target="_blank" rel="noopener noreferrer">CEU Profile</a>
      &nbsp;·&nbsp;
      <a href="https://orcid.org/0000-0003-4223-2232"
         target="_blank" rel="noopener noreferrer">ORCID</a>
    </div>
  </aside>

  <iframe
    id="content-frame"
    src="home.html"
    title="Page content">
  </iframe>
</div>
  
<script>
    var hamburgerBtn = document.getElementById('hamburger-btn');
    var mobileNav    = document.getElementById('mobile-nav');

    hamburgerBtn.addEventListener('click', function() {
      var isOpen = mobileNav.classList.toggle('open');
      hamburgerBtn.classList.toggle('open', isOpen);
      hamburgerBtn.setAttribute('aria-expanded', String(isOpen));
    });

    function loadPage(url, el, isMobile) {
      event.preventDefault();

      // Update iframe
      document.getElementById('content-frame').src = url;

      // Clear active state in both navs, then set on clicked link
      document.querySelectorAll('.nav-link').forEach(function(link) {
        link.classList.remove('active');
        if (link.getAttribute('href') === url) link.classList.add('active');
      });

      // Close mobile menu after selection
      if (isMobile) {
        mobileNav.classList.remove('open');
        hamburgerBtn.classList.remove('open');
        hamburgerBtn.setAttribute('aria-expanded', 'false');
      }
    }
  </script>
  
</body>
</html>
